<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人加密日记本</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css">
    <style>
        :root {
            --primary-color: #3498db;
            --primary-dark: #2980b9;
            --secondary-color: #2ecc71;
            --danger-color: #e74c3c;
            --light-bg: #f8f9fa;
            --dark-bg: #121212;
            --card-bg: #ffffff;
            --dark-card-bg: #1e1e1e;
            --text-color: #333333;
            --text-light: #6c757d;
            --text-dark: #f8f9fa;
            --border-color: #dee2e6;
            --dark-border-color: #444;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Noto Serif SC', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-bg);
            color: var(--text-color);
            transition: var(--transition);
        }

        body.dark-mode {
            background-color: var(--dark-bg);
            color: var(--text-dark);
        }

        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        body.dark-mode header {
            background-color: var(--dark-card-bg);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
        }

        .logo i {
            margin-right: 0.8rem;
            font-size: 1.5rem;
        }

        .main-content {
            display: flex;
            flex: 1;
            gap: 20px;
            padding: 20px;
        }

        .sidebar {
            width: 280px;
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        body.dark-mode .sidebar {
            background-color: var(--dark-card-bg);
            border: 1px solid var(--dark-border-color);
        }

        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        body.dark-mode .editor-container {
            background-color: var(--dark-card-bg);
            border: 1px solid var(--dark-border-color);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background-color: white;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        body.dark-mode .toolbar {
            background-color: #252525;
            border-color: var(--dark-border-color);
        }

        .ql-toolbar.ql-snow {
            border: none;
            border-bottom: 1px solid var(--border-color);
            background: white;
        }

        body.dark-mode .ql-toolbar.ql-snow {
            background: #252525;
            border-color: var(--dark-border-color);
        }

        .ql-container.ql-snow {
            border: none;
            flex: 1;
            overflow-y: auto;
        }

        .editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .entry-list {
            margin-top: 15px;
            max-height: 500px;
            overflow-y: auto;
        }

        .entry-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: var(--transition);
            border-radius: 4px;
        }

        body.dark-mode .entry-item {
            border-color: var(--dark-border-color);
        }

        .entry-item:hover {
            background-color: rgba(52, 152, 219, 0.1);
        }

        body.dark-mode .entry-item:hover {
            background-color: rgba(41, 128, 185, 0.2);
        }

        .entry-item.selected {
            background-color: rgba(52, 152, 219, 0.2);
            font-weight: bold;
        }

        body.dark-mode .entry-item.selected {
            background-color: rgba(41, 128, 185, 0.3);
        }

        .entry-title {
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .entry-date {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        body.dark-mode .entry-date {
            color: #aaa;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
        }

        .btn-secondary {
            background-color: var(--secondary-color);
            color: white;
        }

        .btn-secondary:hover {
            background-color: #27ae60;
        }

        .btn-danger {
            background-color: var(--danger-color);
            color: white;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }

        body.dark-mode .btn-outline {
            border-color: var(--dark-border-color);
            color: var(--text-dark);
        }

        .btn-outline:hover {
            background-color: rgba(0,0,0,0.05);
        }

        body.dark-mode .btn-outline:hover {
            background-color: rgba(255,255,255,0.05);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .password-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        body.dark-mode .password-section {
            border-top-color: var(--dark-border-color);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
            transition: var(--transition);
        }

        body.dark-mode input[type="password"] {
            background-color: #333;
            border-color: var(--dark-border-color);
            color: var(--text-dark);
        }

        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .settings-bar {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            cursor: pointer;
            gap: 8px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary-color);
        }

        input:focus + .slider {
            box-shadow: 0 0 1px var(--primary-color);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .status-bar {
            padding: 10px 20px;
            background-color: rgba(0,0,0,0.03);
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: var(--text-light);
            display: flex;
            justify-content: space-between;
        }

        body.dark-mode .status-bar {
            background-color: rgba(255,255,255,0.05);
            border-color: var(--dark-border-color);
            color: #aaa;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transform: translateY(-20px);
            transition: var(--transition);
        }

        body.dark-mode .modal-content {
            background-color: var(--dark-card-bg);
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }

        .modal-body {
            margin-bottom: 25px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
            .entry-list {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <i>📝</i> <span>私人加密日记本</span>
            </div>
            <div class="settings-bar">
                <div class="theme-toggle">
                    <span>深色模式</span>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </header>

        <div class="main-content">
            <div class="sidebar">
                <div class="input-group">
                    <label for="search">搜索日记</label>
                    <input type="text" id="search" placeholder="输入关键词...">
                </div>
                
                <div class="btn-group">
                    <button id="new-entry" class="btn btn-primary">
                        <i>+</i> 新建日记
                    </button>
                    <button id="save-entry" class="btn btn-secondary">
                        <i>💾</i> 保存
                    </button>
                </div>
                
                <div class="entry-list" id="entry-list">
                    <!-- 日记列表将通过JS动态生成 -->
                </div>
                
                <div class="password-section">
                    <div class="input-group">
                        <label for="password">主密码</label>
                        <input type="password" id="password" placeholder="输入解锁密码">
                    </div>
                    <button id="set-password" class="btn btn-secondary">设置/解锁</button>
                    
                    <div class="btn-group">
                        <button id="export-btn" class="btn btn-outline">
                            <i>📥</i> 导出备份
                        </button>
                        <button id="import-btn" class="btn btn-outline">
                            <i>📤</i> 导入备份
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="editor-container">
                <div class="toolbar">
                    <h3 id="entry-title">新日记</h3>
                    <button id="delete-entry" class="btn btn-danger">
                        <i>🗑️</i> 删除日记
                    </button>
                </div>
                <div class="editor">
                    <div id="editor"></div>
                </div>
                <div class="status-bar">
                    <span>状态: <span id="status">未锁定</span></span>
                    <span>最后保存: <span id="last-saved">从未保存</span></span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 备份模态框 -->
    <div class="modal" id="backup-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">数据备份</h3>
            </div>
            <div class="modal-body" id="backup-content">
                <!-- 备份内容将通过JS动态生成 -->
            </div>
            <div class="modal-footer">
                <button id="close-backup" class="btn btn-outline">关闭</button>
            </div>
        </div>
    </div>
    
    <!-- 导入模态框 -->
    <div class="modal" id="import-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">导入备份数据</h3>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label for="backup-data">备份数据</label>
                    <textarea id="backup-data" rows="10" style="width: 100%; padding: 10px;"></textarea>
                </div>
                <div class="input-group">
                    <label for="import-password">备份密码（可选）</label>
                    <input type="password" id="import-password" placeholder="如果备份有额外密码保护">
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancel-import" class="btn btn-outline">取消</button>
                <button id="confirm-import" class="btn btn-primary">导入</button>
            </div>
        </div>
    </div>

    <!-- 引入必要的库 -->
     <script src="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
        // 初始化富文本编辑器
        const quill = new Quill('#editor', {
            modules: {
                toolbar: [
                    [{ header: [1, 2, 3, 4, 5, 6, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    ['blockquote', 'code-block'],
                    [{ list: 'ordered' }, { list: 'bullet' }],
                    ['link', 'image'],
                    ['clean']
                ]
            },
            placeholder: '写下你的想法...',
            theme: 'snow'
        });

        // 数据库和状态管理
        let db;
        let entries = [];
        let currentEntry = null;
        let encryptionKey = null;
        let isLocked = true;

        // DOM 元素
        const entryListElement = document.getElementById('entry-list');
        const entryTitleElement = document.getElementById('entry-title');
        const statusElement = document.getElementById('status');
        const lastSavedElement = document.getElementById('last-saved');
        const passwordInput = document.getElementById('password');
        const searchInput = document.getElementById('search');
        const newEntryBtn = document.getElementById('new-entry');
        const saveEntryBtn = document.getElementById('save-entry');
        const deleteEntryBtn = document.getElementById('delete-entry');
        const setPasswordBtn = document.getElementById('set-password');
        const exportBtn = document.getElementById('export-btn');
        const importBtn = document.getElementById('import-btn');
        const themeToggle = document.getElementById('theme-toggle');
        const backupModal = document.getElementById('backup-modal');
        const importModal = document.getElementById('import-modal');
        const backupContentElement = document.getElementById('backup-content');
        const backupDataElement = document.getElementById('backup-data');
        const importPasswordElement = document.getElementById('import-password');
        const closeBackupBtn = document.getElementById('close-backup');
        const cancelImportBtn = document.getElementById('cancel-import');
        const confirmImportBtn = document.getElementById('confirm-import');

        // 初始化
        document.addEventListener('DOMContentLoaded', initApp);

        // 应用初始化
        function initApp() {
            // 检查深色模式设置
            const savedTheme = localStorage.getItem('diaryTheme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                themeToggle.checked = true;
            }
            
            // 初始化数据库
            initDatabase();
            
            // 事件监听器
            setupEventListeners();
        }

        // 初始化IndexedDB
        function initDatabase() {
            const request = indexedDB.open('EncryptedDiaryDB', 1);
            
            request.onupgradeneeded = function(event) {
                const db = event.target.result;
                if (!db.objectStoreNames.contains('entries')) {
                    const store = db.createObjectStore('entries', { keyPath: 'id', autoIncrement: true });
                    store.createIndex('date', 'date', { unique: false });
                }
                
                if (!db.objectStoreNames.contains('settings')) {
                    db.createObjectStore('settings', { keyPath: 'name' });
                }
            };
            
            request.onsuccess = function(event) {
                db = event.target.result;
                loadSettings();
                updateStatus('数据库已加载');
            };
            
            request.onerror = function(event) {
                console.error('数据库打开失败:', event.target.error);
                updateStatus('数据库错误', true);
            };
        }

        // 加载设置
        function loadSettings() {
            if (!db) return;
            
            const transaction = db.transaction(['settings'], 'readonly');
            const store = transaction.objectStore('settings');
            const request = store.get('encryptionSalt');
            
            request.onsuccess = function() {
                if (request.result) {
                    // 如果已有加密盐值，则应用已初始化
                    updateStatus('请输入密码解锁日记');
                } else {
                    updateStatus('请设置主密码');
                }
            };
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 密码设置/解锁
            setPasswordBtn.addEventListener('click', handlePassword);
            
            // 日记操作
            newEntryBtn.addEventListener('click', createNewEntry);
            saveEntryBtn.addEventListener('click', saveCurrentEntry);
            deleteEntryBtn.addEventListener('click', deleteCurrentEntry);
            
            // 搜索功能
            searchInput.addEventListener('input', filterEntries);
            
            // 导入导出
            exportBtn.addEventListener('click', showExportModal);
            importBtn.addEventListener('click', () => importModal.classList.add('active'));
            
            // 模态框控制
            closeBackupBtn.addEventListener('click', () => backupModal.classList.remove('active'));
            cancelImportBtn.addEventListener('click', () => importModal.classList.remove('active'));
            confirmImportBtn.addEventListener('click', importBackupData);
            
            // 主题切换
            themeToggle.addEventListener('change', toggleTheme);
            
            // 编辑器自动保存
            quill.on('text-change', debounce(autoSaveEntry, 2000));
        }

        // 处理密码设置/解锁
        function handlePassword() {
            const password = passwordInput.value.trim();
            if (!password) {
                alert('请输入密码');
                return;
            }
            
            // 检查是否已有加密盐值
            const transaction = db.transaction(['settings'], 'readonly');
            const store = transaction.objectStore('settings');
            const request = store.get('encryptionSalt');
            
            request.onsuccess = function() {
                if (request.result) {
                    // 已有盐值 - 解锁
                    const salt = request.result.value;
                    deriveKey(password, salt).then(key => {
                        encryptionKey = key;
                        isLocked = false;
                        updateStatus('已解锁');
                        loadEntries();
                    }).catch(error => {
                        console.error('解密失败:', error);
                        alert('密码错误或解密失败');
                    });
                } else {
                    // 没有盐值 - 设置新密码
                    const salt = CryptoJS.lib.WordArray.random(128/8).toString();
                    deriveKey(password, salt).then(key => {
                        encryptionKey = key;
                        isLocked = false;
                        
                        // 保存盐值
                        const tx = db.transaction(['settings'], 'readwrite');
                        const settingsStore = tx.objectStore('settings');
                        settingsStore.put({ name: 'encryptionSalt', value: salt });
                        
                        updateStatus('密码已设置并解锁');
                        loadEntries();
                    });
                }
            };
        }

        // 派生加密密钥
        function deriveKey(password, salt) {
            return new Promise((resolve, reject) => {
                try {
                    // 使用PBKDF2算法派生密钥
                    const key = CryptoJS.PBKDF2(password, salt, {
                        keySize: 256/32,
                        iterations: 100000
                    });
                    resolve(key.toString());
                } catch (error) {
                    reject(error);
                }
            });
        }

        // 创建新日记
        function createNewEntry() {
            if (isLocked) {
                alert('请先解锁日记');
                return;
            }
            
            currentEntry = {
                id: Date.now(),
                title: '新日记',
                content: '',
                date: new Date().toISOString()
            };
            
            renderEntryEditor(currentEntry);
            saveEntry(currentEntry);
        }

        // 保存日记
        function saveEntry(entry) {
            if (isLocked) return;
            
            // 加密内容
            const encryptedContent = encryptData(entry.content);
            
            const tx = db.transaction(['entries'], 'readwrite');
            const store = tx.objectStore('entries');
            
            store.put({
                id: entry.id,
                title: entry.title,
                content: encryptedContent,
                date: entry.date
            });
            
            tx.oncomplete = function() {
                updateLastSaved();
                loadEntries();
            };
            
            tx.onerror = function(event) {
                console.error('保存失败:', event.target.error);
                updateStatus('保存失败', true);
            };
        }

        // 加密数据
        function encryptData(data) {
            if (!encryptionKey) return data;
            return CryptoJS.AES.encrypt(data, encryptionKey).toString();
        }

        // 解密数据
        function decryptData(encryptedData) {
            if (!encryptionKey) return encryptedData;
            try {
                const bytes = CryptoJS.AES.decrypt(encryptedData, encryptionKey);
                return bytes.toString(CryptoJS.enc.Utf8);
            } catch (e) {
                console.error('解密失败:', e);
                return '无法解密内容 - 请检查密码';
            }
        }

        // 加载日记列表
        function loadEntries() {
            if (isLocked || !db) return;
            
            const tx = db.transaction(['entries'], 'readonly');
            const store = tx.objectStore('entries');
            const index = store.index('date');
            const request = index.getAll();
            
            request.onsuccess = function() {
                entries = request.result;
                renderEntryList(entries);
            };
        }

        // 渲染日记列表
        function renderEntryList(entries) {
            entryListElement.innerHTML = '';
            
            if (entries.length === 0) {
                entryListElement.innerHTML = '<p>暂无日记</p>';
                return;
            }
            
            // 按日期排序（最新的在前面）
            const sortedEntries = [...entries].sort((a, b) => 
                new Date(b.date) - new Date(a.date));
            
            sortedEntries.forEach(entry => {
                const entryElement = document.createElement('div');
                entryElement.className = 'entry-item';
                if (currentEntry && entry.id === currentEntry.id) {
                    entryElement.classList.add('selected');
                }
                
                entryElement.innerHTML = `
                    <div class="entry-title">${entry.title}</div>
                    <div class="entry-date">${formatDate(entry.date)}</div>
                `;
                
                entryElement.addEventListener('click', () => {
                    loadEntry(entry.id);
                });
                
                entryListElement.appendChild(entryElement);
            });
        }

        // 加载日记内容
        function loadEntry(id) {
            const tx = db.transaction(['entries'], 'readonly');
            const store = tx.objectStore('entries');
            const request = store.get(id);
            
            request.onsuccess = function() {
                const entry = request.result;
                if (entry) {
                    // 解密内容
                    entry.content = decryptData(entry.content);
                    currentEntry = entry;
                    renderEntryEditor(entry);
                }
            };
        }

        // 渲染编辑器
        function renderEntryEditor(entry) {
            entryTitleElement.textContent = entry.title;
            quill.root.innerHTML = entry.content;
            quill.enable(!isLocked);
            
            // 高亮当前选中的日记
            const items = document.querySelectorAll('.entry-item');
            items.forEach(item => {
                item.classList.remove('selected');
            });
            
            const currentItem = document.querySelector(`.entry-item[data-id="${entry.id}"]`);
            if (currentItem) {
                currentItem.classList.add('selected');
            }
        }

        // 保存当前日记
        function saveCurrentEntry() {
            if (!currentEntry || isLocked) return;
            
            // 从编辑器中获取内容
            currentEntry.content = quill.root.innerHTML;
            
            // 从内容中提取标题
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = currentEntry.content;
            const firstText = tempDiv.textContent.trim().substring(0, 50);
            currentEntry.title = firstText || '无标题日记';
            
            saveEntry(currentEntry);
        }

        // 自动保存
        function autoSaveEntry() {
            if (!currentEntry || isLocked) return;
            
            // 只在内容变化时保存
            const newContent = quill.root.innerHTML;
            if (newContent !== currentEntry.content) {
                saveCurrentEntry();
            }
        }

        // 删除当前日记
        function deleteCurrentEntry() {
            if (!currentEntry || isLocked) {
                alert('请先解锁并选择一篇日记');
                return;
            }
            
            if (!confirm(`确定要删除 "${currentEntry.title}" 吗？`)) {
                return;
            }
            
            const tx = db.transaction(['entries'], 'readwrite');
            const store = tx.objectStore('entries');
            store.delete(currentEntry.id);
            
            tx.oncomplete = function() {
                currentEntry = null;
                quill.root.innerHTML = '';
                entryTitleElement.textContent = '新日记';
                updateStatus('日记已删除');
                loadEntries();
            };
        }

        // 过滤日记
        function filterEntries() {
            const searchTerm = searchInput.value.toLowerCase();
            if (!searchTerm) {
                renderEntryList(entries);
                return;
            }
            
            const filtered = entries.filter(entry => {
                const titleMatch = entry.title.toLowerCase().includes(searchTerm);
                // 注意：内容已加密，我们无法直接搜索加密内容
                return titleMatch;
            });
            
            renderEntryList(filtered);
        }

        // 显示导出模态框
        function showExportModal() {
            if (isLocked) {
                alert('请先解锁日记');
                return;
            }
            
            exportData().then(data => {
                backupContentElement.innerHTML = `
                    <p>请复制以下备份数据并妥善保存：</p>
                    <textarea id="backup-text" style="width: 100%; height: 200px; padding: 10px; font-family: monospace;">${data}</textarea>
                    <p><small>提示：此备份包含所有加密日记。请定期备份以防止数据丢失。</small></p>
                `;
                backupModal.classList.add('active');
                
                // 自动选择文本
                setTimeout(() => {
                    const textarea = document.getElementById('backup-text');
                    textarea.select();
                }, 100);
            });
        }

        // 导出数据
        function exportData() {
            return new Promise((resolve, reject) => {
                if (!db || isLocked) {
                    reject('数据库未初始化或应用已锁定');
                    return;
                }
                
                const tx = db.transaction(['entries'], 'readonly');
                const store = tx.objectStore('entries');
                const request = store.getAll();
                
                request.onsuccess = function() {
                    const entries = request.result;
                    const exportData = {
                        meta: {
                            version: 1,
                            exportedAt: new Date().toISOString(),
                            entryCount: entries.length
                        },
                        entries: entries
                    };
                    
                    resolve(JSON.stringify(exportData, null, 2));
                };
                
                request.onerror = function(event) {
                    reject(event.target.error);
                };
            });
        }

        // 导入备份数据
        function importBackupData() {
            const backupData = backupDataElement.value.trim();
            const importPassword = importPasswordElement.value;
            
            if (!backupData) {
                alert('请粘贴备份数据');
                return;
            }
            
            try {
                const data = JSON.parse(backupData);
                
                if (!data.entries || !Array.isArray(data.entries)) {
                    throw new Error('无效的备份格式');
                }
                
                // 确认用户知道导入将覆盖现有数据
                if (!confirm(`将导入 ${data.entries.length} 篇日记。此操作将覆盖现有日记，确定继续吗？`)) {
                    return;
                }
                
                const tx = db.transaction(['entries'], 'readwrite');
                const store = tx.objectStore('entries');
                
                // 清除现有数据
                store.clear();
                
                // 添加新数据
                data.entries.forEach(entry => {
                    store.add(entry);
                });
                
                tx.oncomplete = function() {
                    alert(`成功导入 ${data.entries.length} 篇日记`);
                    importModal.classList.remove('active');
                    backupDataElement.value = '';
                    importPasswordElement.value = '';
                    loadEntries();
                };
                
                tx.onerror = function(event) {
                    console.error('导入失败:', event.target.error);
                    alert('导入失败，请检查数据格式');
                };
            } catch (e) {
                console.error('导入错误:', e);
                alert('备份数据格式无效: ' + e.message);
            }
        }

        // 切换主题
        function toggleTheme() {
            if (themeToggle.checked) {
                document.body.classList.add('dark-mode');
                localStorage.setItem('diaryTheme', 'dark');
            } else {
                document.body.classList.remove('dark-mode');
                localStorage.setItem('diaryTheme', 'light');
            }
        }

        // 工具函数：格式化日期
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 工具函数：更新状态
        function updateStatus(message, isError = false) {
            statusElement.textContent = message;
            statusElement.style.color = isError ? 'var(--danger-color)' : '';
        }

        // 工具函数：更新最后保存时间
        function updateLastSaved() {
            lastSavedElement.textContent = new Date().toLocaleTimeString('zh-CN');
        }

        // 工具函数：防抖
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }
    </script>
</body>
</html>
