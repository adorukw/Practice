<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习进度追踪器</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4e73df;
            --secondary: #858796;
            --success: #1cc88a;
            --info: #36b9cc;
            --light: #f8f9fc;
            --dark: #5a5c69;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 250px 1fr;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .sidebar {
            background: var(--dark);
            color: white;
            padding: 20px;
        }
        
        .main-content {
            padding: 20px;
            background: var(--light);
            overflow-y: auto;
        }
        
        .course-card {
            background: white;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
        }
        
        .progress-bar {
            height: 10px;
            background: #e9ecef;
            border-radius: 5px;
            margin: 10px 0;
        }
        
        .progress-value {
            height: 100%;
            background: var(--success);
            border-radius: 5px;
        }
        
        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <h2>我的课程</h2>
            <ul id="course-list">
                <li>JavaScript高级课程</li>
                <li>React实战开发</li>
                <li>Node.js后端开发</li>
            </ul>
            <button id="add-course">添加课程</button>
        </div>
        
        <div class="main-content">
            <h1 id="current-course">JavaScript高级课程</h1>
            
            <div class="course-card">
                <h3>课程进度</h3>
                <div class="progress-bar">
                    <div class="progress-value" style="width: 65%"></div>
                </div>
                <p>65% 已完成</p>
            </div>
            
            <div class="course-card">
                <h3>章节列表</h3>
                <ul id="chapter-list">
                    <li><input type="checkbox" checked> 闭包和作用域</li>
                    <li><input type="checkbox" checked> 原型和继承</li>
                    <li><input type="checkbox"> 异步编程</li>
                    <li><input type="checkbox"> 设计模式</li>
                </ul>
            </div>
            
            <div class="course-card">
                <h3>学习笔记</h3>
                <textarea id="course-notes" rows="5" style="width: 100%; padding: 10px;"></textarea>
                <button id="save-notes">保存笔记</button>
            </div>
            
            <div class="chart-container">
                <canvas id="progress-chart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // 学习进度追踪器核心功能
        class ProgressTracker {
            constructor() {
                this.courses = [];
                this.currentCourse = null;
                this.init();
            }
            
            init() {
                this.loadCourses();
                this.setupEventListeners();
                this.renderProgressChart();
            }
            
            loadCourses() {
                // 从IndexedDB加载数据
                const savedData = localStorage.getItem('courses');
                if (savedData) {
                    this.courses = JSON.parse(savedData);
                    if (this.courses.length > 0) {
                        this.currentCourse = this.courses[0];
                        this.renderCourse();
                    }
                }
            }
            
            saveCourses() {
                localStorage.setItem('courses', JSON.stringify(this.courses));
            }
            
            addCourse(name) {
                const newCourse = {
                    id: Date.now(),
                    name: name,
                    chapters: [],
                    notes: "",
                    progress: 0
                };
                
                this.courses.push(newCourse);
                this.saveCourses();
                this.currentCourse = newCourse;
                this.renderCourse();
            }
            
            renderCourse() {
                document.getElementById('current-course').textContent = this.currentCourse.name;
                // 渲染章节列表
                // 渲染进度
                // 渲染笔记
            }
            
            renderProgressChart() {
                const ctx = document.getElementById('progress-chart').getContext('2d');
                const chart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'],
                        datasets: [{
                            label: '学习时间 (小时)',
                            data: [2, 1.5, 3, 1, 2.5, 0, 4],
                            backgroundColor: 'rgba(78, 115, 223, 0.5)',
                            borderColor: 'rgba(78, 115, 223, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            }
            
            setupEventListeners() {
                document.getElementById('add-course').addEventListener('click', () => {
                    const name = prompt('请输入课程名称:');
                    if (name) this.addCourse(name);
                });
                
                // 其他事件监听
            }
        }
        
        const tracker = new ProgressTracker();
    </script>
</body>
</html>
