<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人知识图谱</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f7fa;
            color: #333;
        }
        
        .container {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 100vh;
        }
        
        .sidebar {
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            overflow-y: auto;
        }
        
        .graph-container {
            position: relative;
            background-color: #f0f2f5;
        }
        
        h1 {
            color: #2c3e50;
            margin-top: 0;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #2980b9;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn-secondary {
            background-color: #95a5a6;
        }
        
        .btn-secondary:hover {
            background-color: #7f8c8d;
        }
        
        .node {
            fill: #3498db;
            stroke: #2980b9;
            stroke-width: 2px;
            cursor: pointer;
            transition: fill 0.3s;
        }
        
        .node:hover {
            fill: #2980b9;
        }
        
        .node-text {
            font-size: 12px;
            text-anchor: middle;
            pointer-events: none;
            fill: white;
            font-weight: bold;
        }
        
        .link {
            stroke: #95a5a6;
            stroke-width: 2px;
        }
        
        .selected {
            fill: #e74c3c;
            stroke: #c0392b;
        }
        
        .knowledge-gap {
            fill: #e74c3c;
            stroke: #c0392b;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        .resource-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 4px;
        }
        
        .resource-item {
            padding: 8px;
            margin-bottom: 8px;
            background-color: #f9f9f9;
            border-radius: 4px;
            border-left: 3px solid #3498db;
        }
        
        .resource-title {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .resource-url {
            color: #3498db;
            font-size: 14px;
            word-break: break-all;
        }
        
        .gap-warning {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 4px;
            margin-top: 15px;
            display: none;
        }
        
        .tooltip {
            position: absolute;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px;
            border-radius: 4px;
            pointer-events: none;
            font-size: 14px;
            z-index: 10;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>个人知识图谱</h1>
            
            <div class="form-group">
                <label for="node-name">概念名称</label>
                <input type="text" id="node-name" placeholder="输入概念名称">
            </div>
            
            <div class="form-group">
                <label for="node-description">概念描述</label>
                <textarea id="node-description" placeholder="概念描述..."></textarea>
            </div>
            
            <div class="form-group">
                <label for="resource-title">学习资源标题</label>
                <input type="text" id="resource-title" placeholder="资源标题">
            </div>
            
            <div class="form-group">
                <label for="resource-url">学习资源URL</label>
                <input type="text" id="resource-url" placeholder="https://example.com">
            </div>
            
            <div class="btn-group">
                <button id="add-node">添加概念</button>
                <button id="add-resource">添加资源</button>
            </div>
            
            <div class="resource-list" id="resource-list">
                <!-- 资源列表将在这里显示 -->
            </div>
            
            <div class="gap-warning" id="gap-warning">
                <strong>知识缺口警告:</strong>
                <p id="gap-message"></p>
            </div>
            
            <div class="btn-group">
                <button id="detect-gaps">检测知识缺口</button>
                <button id="save-graph" class="btn-secondary">保存图谱</button>
                <button id="reset-graph" class="btn-secondary">重置图谱</button>
            </div>
        </div>
        
        <div class="graph-container">
            <svg id="graph-svg"></svg>
            <div class="tooltip" id="tooltip"></div>
        </div>
    </div>

    <script>
        // 初始化变量
        let nodes = [];
        let links = [];
        let selectedNode = null;
        let hoveredNode = null;
        
        // 初始化SVG
        const svg = d3.select("#graph-svg");
        const width = window.innerWidth - 300;
        const height = window.innerHeight;
        
        svg.attr("width", width)
           .attr("height", height);
        
        // 初始化力导向图
        const simulation = d3.forceSimulation()
            .force("link", d3.forceLink().id(d => d.id).distance(100))
            .force("charge", d3.forceManyBody().strength(-300))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(40));
        
        // 加载保存的数据
        loadGraphData();
        
        // 绘制图谱
        drawGraph();
        
        // 添加节点按钮事件
        document.getElementById("add-node").addEventListener("click", addNode);
        
        // 添加资源按钮事件
        document.getElementById("add-resource").addEventListener("click", addResource);
        
        // 检测知识缺口按钮事件
        document.getElementById("detect-gaps").addEventListener("click", detectKnowledgeGaps);
        
        // 保存图谱按钮事件
        document.getElementById("save-graph").addEventListener("click", saveGraph);
        
        // 重置图谱按钮事件
        document.getElementById("reset-graph").addEventListener("click", resetGraph);
        
        // 添加节点函数
        function addNode() {
            const name = document.getElementById("node-name").value.trim();
            const description = document.getElementById("node-description").value.trim();
            
            if (!name) {
                alert("请输入概念名称");
                return;
            }
            
            const newNode = {
                id: `node-${Date.now()}`,
                name: name,
                description: description,
                resources: [],
                x: width / 2,
                y: height / 2
            };
            
            nodes.push(newNode);
            
            // 清除表单
            document.getElementById("node-name").value = "";
            document.getElementById("node-description").value = "";
            
            // 重新绘制图谱
            drawGraph();
        }
        
        // 添加资源函数
        function addResource() {
            if (!selectedNode) {
                alert("请先选择一个概念节点");
                return;
            }
            
            const title = document.getElementById("resource-title").value.trim();
            const url = document.getElementById("resource-url").value.trim();
            
            if (!title || !url) {
                alert("请填写资源标题和URL");
                return;
            }
            
            // 添加到当前选中节点的资源列表
            const nodeIndex = nodes.findIndex(n => n.id === selectedNode.id);
            if (nodeIndex !== -1) {
                nodes[nodeIndex].resources.push({
                    title: title,
                    url: url
                });
                
                // 更新资源列表显示
                displayResources(nodes[nodeIndex]);
                
                // 清除表单
                document.getElementById("resource-title").value = "";
                document.getElementById("resource-url").value = "";
                
                // 重新绘制图谱
                drawGraph();
            }
        }
        
        // 绘制图谱函数
        function drawGraph() {
            // 清除现有图谱
            svg.selectAll("*").remove();
            
            // 创建链接
            const link = svg.append("g")
                .attr("stroke", "#999")
                .attr("stroke-opacity", 0.6)
                .selectAll("line")
                .data(links)
                .join("line")
                .attr("class", "link")
                .attr("stroke-width", 2);
            
            // 创建节点
            const node = svg.append("g")
                .selectAll("circle")
                .data(nodes)
                .join("circle")
                .attr("class", d => {
                    let classes = "node";
                    if (selectedNode && d.id === selectedNode.id) classes += " selected";
                    if (d.hasGap) classes += " knowledge-gap";
                    return classes;
                })
                .attr("r", 30)
                .attr("fill", d => d.hasGap ? "#e74c3c" : "#3498db")
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended))
                .on("click", (event, d) => {
                    // 选择节点
                    selectedNode = d;
                    displayResources(d);
                    drawGraph();
                })
                .on("mouseover", (event, d) => {
                    hoveredNode = d;
                    showTooltip(event, d);
                })
                .on("mouseout", () => {
                    hoveredNode = null;
                    hideTooltip();
                });
            
            // 添加节点文本
            const text = svg.append("g")
                .selectAll("text")
                .data(nodes)
                .join("text")
                .attr("class", "node-text")
                .attr("x", d => d.x)
                .attr("y", d => d.y)
                .attr("dy", "0.35em")
                .text(d => d.name.substring(0, 10));
            
            // 更新模拟
            simulation.nodes(nodes);
            simulation.force("link").links(links);
            simulation.alpha(1).restart();
            
            // 更新位置
            simulation.on("tick", () => {
                link
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);
                
                node
                    .attr("cx", d => d.x)
                    .attr("cy", d => d.y);
                
                text
                    .attr("x", d => d.x)
                    .attr("y", d => d.y);
            });
        }
        
        // 拖拽函数
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }
        
        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }
        
        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
        
        // 显示资源列表
        function displayResources(node) {
            const resourceList = document.getElementById("resource-list");
            resourceList.innerHTML = "";
            
            if (node.resources.length === 0) {
                resourceList.innerHTML = "<p>该概念暂无学习资源</p>";
                return;
            }
            
            node.resources.forEach(resource => {
                const resourceItem = document.createElement("div");
                resourceItem.className = "resource-item";
                resourceItem.innerHTML = `
                    <div class="resource-title">${resource.title}</div>
                    <a href="${resource.url}" target="_blank" class="resource-url">${resource.url}</a>
                `;
                resourceList.appendChild(resourceItem);
            });
        }
        
        // 检测知识缺口
        function detectKnowledgeGaps() {
            // 重置所有节点的缺口标记
            nodes.forEach(node => {
                node.hasGap = false;
            });
            
            const gapMessages = [];
            
            // 检测孤立节点（没有连接的节点）
            const isolatedNodes = nodes.filter(node => {
                const connectedLinks = links.filter(link => 
                    link.source.id === node.id || link.target.id === node.id
                );
                return connectedLinks.length === 0;
            });
            
            if (isolatedNodes.length > 0) {
                isolatedNodes.forEach(node => {
                    node.hasGap = true;
                    gapMessages.push(`孤立概念: ${node.name}`);
                });
            }
            
            // 检测资源不足的节点
            const resourcePoorNodes = nodes.filter(node => node.resources.length === 0);
            if (resourcePoorNodes.length > 0) {
                resourcePoorNodes.forEach(node => {
                    if (!node.hasGap) {
                        node.hasGap = true;
                        gapMessages.push(`资源不足: ${node.name}`);
                    }
                });
            }
            
            // 显示警告
            const gapWarning = document.getElementById("gap-warning");
            const gapMessage = document.getElementById("gap-message");
            
            if (gapMessages.length > 0) {
                gapMessage.innerHTML = gapMessages.join("<br>");
                gapWarning.style.display = "block";
            } else {
                gapWarning.style.display = "none";
            }
            
            // 重新绘制图谱
            drawGraph();
        }
        
        // 显示工具提示
        function showTooltip(event, node) {
            const tooltip = document.getElementById("tooltip");
            tooltip.innerHTML = `
                <strong>${node.name}</strong><br>
                ${node.description || "暂无描述"}
                ${node.resources.length > 0 ? `<br><small>${node.resources.length}个学习资源</small>` : ''}
            `;
            
            tooltip.style.display = "block";
            tooltip.style.left = (event.pageX + 10) + "px";
            tooltip.style.top = (event.pageY + 10) + "px";
        }
        
        // 隐藏工具提示
        function hideTooltip() {
            const tooltip = document.getElementById("tooltip");
            tooltip.style.display = "none";
        }
        
        // 保存图谱到本地存储
        function saveGraph() {
            const graphData = {
                nodes: nodes,
                links: links
            };
            
            localStorage.setItem("knowledgeGraph", JSON.stringify(graphData));
            alert("知识图谱已保存！");
        }
        
        // 从本地存储加载图谱
        function loadGraphData() {
            const savedData = localStorage.getItem("knowledgeGraph");
            if (savedData) {
                const graphData = JSON.parse(savedData);
                nodes = graphData.nodes || [];
                links = graphData.links || [];
                
                // 初始化时清除可能的缺口标记
                nodes.forEach(node => {
                    node.hasGap = false;
                });
            }
        }
        
        // 重置图谱
        function resetGraph() {
            if (confirm("确定要重置知识图谱吗？所有数据将被清除。")) {
                nodes = [];
                links = [];
                selectedNode = null;
                localStorage.removeItem("knowledgeGraph");
                document.getElementById("resource-list").innerHTML = "";
                document.getElementById("gap-warning").style.display = "none";
                drawGraph();
            }
        }
        
        // 处理窗口大小变化
        window.addEventListener("resize", () => {
            const newWidth = window.innerWidth - 300;
            svg.attr("width", newWidth);
            simulation.force("center", d3.forceCenter(newWidth / 2, height / 2));
            simulation.alpha(1).restart();
        });
        
        // 添加示例数据
        function addSampleData() {
            if (nodes.length === 0) {
                nodes = [
                    {
                        id: "node1",
                        name: "机器学习",
                        description: "人工智能的核心领域",
                        resources: [
                            {title: "机器学习入门", url: "https://example.com/ml-intro"},
                            {title: "深度学习基础", url: "https://example.com/dl-basics"}
                        ]
                    },
                    {
                        id: "node2",
                        name: "深度学习",
                        description: "机器学习的分支",
                        resources: [
                            {title: "神经网络指南", url: "https://example.com/neural-nets"}
                        ]
                    },
                    {
                        id: "node3",
                        name: "自然语言处理",
                        description: "AI的语言理解能力",
                        resources: []
                    },
                    {
                        id: "node4",
                        name: "计算机视觉",
                        description: "AI的图像识别能力",
                        resources: [
                            {title: "OpenCV教程", url: "https://example.com/opencv"}
                        ]
                    }
                ];
                
                links = [
                    {source: "node1", target: "node2"},
                    {source: "node1", target: "node3"},
                    {source: "node1", target: "node4"},
                    {source: "node2", target: "node3"},
                    {source: "node2", target: "node4"}
                ];
                
                drawGraph();
            }
        }
        
        // 添加初始示例数据
        if (nodes.length === 0) {
            addSampleData();
        }
    </script>
</body>
</html>
