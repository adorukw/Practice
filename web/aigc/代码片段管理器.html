<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码片段管理器</title>
    <link href="https://cdn.jsdelivr.net/npm/@prismjs/themes@1.0.0/prism.css" rel="stylesheet">
    <style>
        .container {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 100vh;
            font-family: 'Consolas', 'Courier New', monospace;
        }
        
        .sidebar {
            background: #2d2d2d;
            color: #ccc;
            padding: 20px;
            overflow-y: auto;
        }
        
        .editor-area {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .editor-header {
            padding: 15px;
            background: #333;
            color: white;
            display: flex;
            justify-content: space-between;
        }
        
        .editor-container {
            flex: 1;
            position: relative;
        }
        
        .tag {
            background: #555;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-right: 5px;
            cursor: pointer;
        }
        
        .tag.active {
            background: #4e73df;
        }
        
        #code-editor {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            padding: 15px;
            border: none;
            background: #f5f5f5;
        }
    </style>
</head>
<body>

                <span class="tag">JavaScript</span>
                <span class="tag">CSS</span>
                <span class="tag">Python</span>
                <button style="float: right;">+</button>
            </div>
            <ul id="snippet-list" style="list-style: none; padding: 0;">

            </ul>
        </div>
        
        <div class="editor-area">
